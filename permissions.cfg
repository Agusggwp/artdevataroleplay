# Access Control List (ACL)
# -------------------------
# Struktur staff: owner > superadmin > admin > moderator > helper > user

add_principal group.owner group.superadmin
add_principal group.superadmin group.admin
add_principal group.admin group.moderator
add_principal group.moderator group.helper
add_principal group.helper group.user

# Hak akses command (sesuaikan jika perlu lebih ketat)
add_ace group.helper command allow
add_ace group.helper command.quit deny
add_ace group.helper idrp.whitelist.bypass allow

add_ace group.moderator command allow
add_ace group.moderator command.quit deny

add_ace group.admin command allow
add_ace group.admin command.quit deny
add_ace group.admin idrp.whitelist.manage allow
add_ace group.admin idrp.adminpanel allow

add_ace group.superadmin command allow
add_ace group.superadmin command.quit deny
add_ace group.superadmin idrp.adminpanel allow

add_ace group.owner command allow
add_ace group.owner command.quit deny
add_ace group.owner idrp.adminpanel allow

# ESX membutuhkan hak ini untuk manajemen principal
add_ace resource.es_extended command.add_ace allow
add_ace resource.es_extended command.add_principal allow
add_ace resource.es_extended command.remove_principal allow
add_ace resource.es_extended command.stop allow

# Contoh isi staff (ganti identifier sesuai akun kamu)
# add_principal identifier.fivem:1111111 group.owner #NAMA_OWNER
# add_principal identifier.discord:111111111111111111 group.superadmin #NAMA_SA
# add_principal identifier.fivem:2222222 group.admin #NAMA_ADMIN
# add_principal identifier.fivem:3333333 group.moderator #NAMA_MOD
# add_principal identifier.fivem:4444444 group.helper #NAMA_HELPER
